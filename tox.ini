# For more information about tox, see https://tox.readthedocs.io/en/latest/
# TL;DR: tox is a tool to automate testing in multiple Python environments
# and platforms. It creates virtual environments, installs dependencies, and runs tests.
[tox]
envlist = py{310,311,312,313}-{linux,macos,windows}     # List of environments 'tox' womm create and run tests in
isolated_build=true

[gh-actions]        # Can be understood as: If python-version is 3.10, then use py310 environment
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
PLATFORM =          # Same interpretation as in [gh-actions] but for OS platforms
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
extras =
    testing # Arbitrary name for the group of dependencies defined in pyproject.toml. This will run `pip install -e .[testing]`
commands = pytest -v --color=yes --cov=napari_cellpose_sam --cov-report=xml     # Command 'to' runs to verify that all tests pass in the environment
