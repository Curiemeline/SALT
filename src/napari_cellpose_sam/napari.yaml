name: napari-cellpose-sam
display_name: Cellpose-Sam Segmentation and Finetuning
visibility: public

contributions:
  commands:
    - id: napari-cellpose-sam.get_reader
      python_name: napari_cellpose_sam._reader:napari_get_reader
      title: Open data with Cellpose-Sam Segmentation and Finetuning

    - id: napari-cellpose-sam.write_multiple
      python_name: napari_cellpose_sam._writer:write_multiple
      title: Save multi-layer data with Cellpose-Sam Segmentation and Finetuning

    - id: napari-cellpose-sam.write_single_image
      python_name: napari_cellpose_sam._writer:write_single_image
      title: Save image data with Cellpose-Sam Segmentation and Finetuning

    - id: napari-cellpose-sam.make_sample_data
      python_name: napari_cellpose_sam._sample_data:make_sample_data
      title: Load sample data from Cellpose-Sam Segmentation and Finetuning

    - id: napari-cellpose-sam.cellpose_sam_widget
      python_name: napari_cellpose_sam._widget:CellposeSAM
      title: Launch Cellpose-SAM main interface

  readers:
    - command: napari-cellpose-sam.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']

  writers:
    - command: napari-cellpose-sam.write_multiple
      layer_types: ['image*','labels*']
      filename_extensions: []

    - command: napari-cellpose-sam.write_single_image
      layer_types: ['image']
      filename_extensions: ['.npy']

  sample_data:
    - command: napari-cellpose-sam.make_sample_data
      display_name: Cellpose-Sam Segmentation and Finetuning
      key: unique_id.1

  widgets:
    - command: napari-cellpose-sam.cellpose_sam_widget
      display_name: CellposeSAM
